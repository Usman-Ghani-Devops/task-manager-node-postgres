services:
    app:
        build: .
        container_name: "Task-Manager"
        ports:
        - "3000:3000"
        networks:
        - "Task-Manager-network"
        environment:
            PORT: 3000
            DB_HOST: postgres-db
            DB_PORT: 5432
            DB_NAME: taskdb
            DB_USER: postgres
            DB_PASSWORD: postgres
        depends_on: 
         - db
    db:
        image: postgres:17 
        container_name: "postgres-db"
        ports:
        - "5432:5432"
        networks:
        - "Task-Manager-network"
        environment:
            POSTGRES_DB: taskdb
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        volumes:
         - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

networks:
    "Task-Manager-network":